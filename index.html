<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>意大利语美发专题 · Parrucchiere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Outfit', 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #faf0f6 0%, #f5e6f0 100%);
      min-height: 100vh;
      color: #2c2c2c;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 20px 60px;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #e91e8c, #c2185b);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
      box-shadow: 0 8px 30px rgba(233, 30, 140, 0.3);
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #e91e8c, #c2185b);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 36px;
      font-weight: 700;
      color: #2c2c2c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      color: #888;
      font-weight: 400;
    }

    .coming-soon {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .coming-icon {
      font-size: 80px;
      margin-bottom: 24px;
    }

    .coming-soon h2 {
      font-family: 'Noto Serif SC', serif;
      font-size: 28px;
      color: #2c2c2c;
      margin-bottom: 12px;
    }

    .coming-soon p {
      color: #888;
      font-size: 16px;
    }

    .footer {
      text-align: center;
      margin-top: 50px;
      padding-top: 30px;
      border-top: 1px solid #e5e5e5;
    }

    .footer a {
      color: #e91e8c;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }

    .footer p {
      font-size: 12px;
      color: #bbb;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      .container { padding: 40px 16px 40px; }
      h1 { font-size: 28px; }
      .coming-soon { padding: 40px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">💇</div>
      <div class="badge">专题学习</div>
      <h1>意大利语美发专题</h1>
      <p class="subtitle">Impara l'italiano del parrucchiere</p>
    </div>

    <div class="coming-soon">
      <div class="coming-icon">✂️</div>
      <h2>即将上线</h2>
      <p>美发店实用对话、术语词汇<br>敬请期待...</p>
    </div>

    <div class="footer">
      <a href="https://github.com/realrentao/italiano-parrucchiere" target="_blank">GitHub · 源码仓库</a>
      <p>抖音博主 @涛子办事处</p>
    </div>
  </div>
</body>
</html>
